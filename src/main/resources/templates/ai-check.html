<!DOCTYPE html>
<html>
<head>
    <title>CSUMB AI | Face Verification</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: #f9f9f9; }
        .header { background: white; padding: 15px 50px; border-bottom: 1px solid #ddd; display: flex; align-items: center; justify-content: space-between; }
        .nav-links a { margin-right: 25px; text-decoration: none; color: #273b5d; font-weight: bold; }
        .hero { background-color: #273b5d; color: white; padding: 60px 50px; text-align: center; }
        .upload-box { background: white; color: #333; padding: 30px; border-radius: 8px; display: inline-block; margin-top: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #preview { max-width: 300px; margin-top: 20px; display: none; border-radius: 8px; }
        .result-badge { padding: 10px 20px; border-radius: 4px; font-weight: bold; margin-top: 15px; display: none; }
    </style>
</head>
<body>

<div class="header">
    <div style="display: flex; align-items: center;">
        <a href="/"><img src="/logo.png" alt="CSUMB Logo" style="height: 45px; margin-right: 30px; border:none;"></a>
        <nav class="nav-links">
            <a href="/newsletter">Newsletter</a>
            <a href="/resume-manager">Resume Manager</a>
            <a href="/ai-check" style="color: #007bff;">AI Image Verification</a>
        </nav>
    </div>
</div>

<div class="hero">
    <h1>AI Face Recognition</h1>
    <p>Upload a photo to verify human identity using AWS Rekognition. Images are processed in-memory and never stored.</p>

    <div class="upload-box">
        <input type="file" id="imageInput" accept="image/*" onchange="previewImage()">
        <br><br>
        <button onclick="uploadImage()" style="background: #273b5d; color: white; padding: 10px 20px; border: none; cursor: pointer;">Verify Identity</button>

        <br>
        <img id="preview" alt="Preview">
        <div id="resultBadge" class="result-badge"></div>
    </div>
</div>

<script>
    function previewImage() {
        const file = document.getElementById('imageInput').files[0];
        const preview = document.getElementById('preview');
        if (file) {
            preview.src = URL.createObjectURL(file);
            preview.style.display = 'block';
        }
    }

    async function uploadImage() {
        const fileInput = document.getElementById('imageInput');
        const badge = document.getElementById('resultBadge');

        if (fileInput.files.length === 0) return alert("Please select a file!");

        const formData = new FormData();
        formData.append("file", fileInput.files[0]);

        badge.style.display = 'block';
        badge.innerText = "Analyzing...";
        badge.style.background = "#eee";

        try {
            const response = await fetch('/api/ai/verify-face', { method: 'POST', body: formData });
            const data = await response.json();

            if (data.isHuman) {
                badge.style.background = "#d4edda";
                badge.style.color = "#155724";
                badge.innerText = ` ${data.message} (Confidence: ${Math.round(data.confidence)}%)`;
            } else {
                badge.style.background = "#f8d7da";
                badge.style.color = "#721c24";
                badge.innerText = ` ${data.message}`;
            }
        } catch (error) {
            badge.innerText = "Error connecting to AI service.";
        }
    }
</script>
</body>
</html>
